name: Publicar en Docker Hub

on:
  push:
    branches: [ "main" ]

# Forzamos a que las acciones usen Node 24 para evitar el aviso de deprecación
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # Este paso es vital para que buildx funcione correctamente y gestione mejor la caché
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./BackEnd
          push: true
          tags: marioalabi/consultorio-backend:latest
          # Usamos cache-from y cache-to para que no tarde mil años en cada push
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./FrontEnd
          push: true
          tags: marioalabi/consultorio-frontend:latest
          build-args: |
            VITE_API_URL=https://consultorioback.marioalabi.com
          cache-from: type=gha
          cache-to: type=gha,mode=max
